function renderDeleteFields(){
 return `<div class="form-row"><div class="label required">删除课程</div><div><input class="control" placeholder="搜索已配置课程" oninput="filterDelete(this.value)"><div class="check-list" id="delete-list">${deleteRows('')}</div><div id="delete-summary" class="drawer-meta" style="margin:10px 0 0">${deleteSummary()}</div><div id="course-error" class="error"></div></div></div><div class="form-row" id="revoke-option"><div class="label required">已发放权益</div><div><label style="margin-right:24px"><input type="radio" name="revoke" value="false" ${!revokeGranted?'checked':''} onchange="setRevokeGranted(false)"> 不回收（默认）</label><label><input type="radio" name="revoke" value="true" ${revokeGranted?'checked':''} onchange="setRevokeGranted(true)"> 同步回收</label><div class="help" id="revoke-summary">${revokeSummary()}</div></div></div>`

 const err=document.querySelector('#upload-error');if(err)err.textContent=''
 for(const f of files){if(uploads.length>=9){if(err)err.textContent='最多上传 9 张图片';break}if(!['image/jpeg','image/png','image/webp'].includes(f.type)){if(err)err.textContent=`${f.name}：仅支持 JPEG、PNG、WebP`;continue}if(f.size>10*1024*1024){if(err)err.textContent=`${f.name}：单张图片不能超过 10 MB`;continue}const item={name:f.name,url:URL.createObjectURL(f),size:f.size,status:'uploading'};uploads.push(item);const index=uploads.length-1;setTimeout(()=>{if(!uploads[index])return;uploads[index].status=f.name.toLowerCase().includes('fail')?'failed':'success';renderUploads()},650)}renderUploads()

(function () {
  const CS = window.DIFF_CHANGESET;
  if (!CS || !CS.changes || !CS.changes.length) return;

  const TYPE_LABEL = { new: "新增", modify: "修改", copy: "文案", enum: "口径", logic: "逻辑", flow: "流程", remove: "删除" };
  const LEVEL_LABEL = { page: "页面级", module: "模块级", field: "字段级" };
  const LS_KEY = "diff-annotator-v3:" + location.pathname;
  const PANEL_W = 360;

  CS.changes.forEach((c, i) => { c._no = String(i + 1).padStart(2, "0"); });

  /* ---------- 状态 ---------- */
  const moduleKeys = [];
  const byModule = {};
  CS.changes.forEach(c => {
    const key = c.page + "::" + c.module;
    if (!byModule[key]) { byModule[key] = []; moduleKeys.push(key); }
    byModule[key].push(c);
  });
  const byTarget = {};
  CS.changes.forEach(c => { (byTarget[c.target] = byTarget[c.target] || []).push(c); });
  const keyOf = c => c.page + "::" + c.module;

  let state = { open: true, enabled: {}, demo: {} };
  try { state = Object.assign(state, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch (e) {}
  state.enabled = state.enabled || {};
  state.demo = state.demo || {};
  moduleKeys.forEach(k => { if (!(k in state.enabled)) state.enabled[k] = false; });
  const demoControls = Array.isArray(CS.meta.demoControls) ? CS.meta.demoControls : [];
  demoControls.forEach(control => {
    if (!(control.id in state.demo)) {
      const firstOption = Array.isArray(control.options) ? control.options[0] : null;
      state.demo[control.id] = control.default ?? (firstOption && firstOption.value);
    }
  });
  const persist = () => { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} };
  const isOn = c => state.enabled[keyOf(c)];

  function pageName(pid) {
    const el = document.getElementById(pid);
    return (el && el.getAttribute("data-diff-page")) || pid;

    cursor:pointer; box-shadow:0 6px 20px rgba(7,29,47,.28); }

  .da-top-actions { display:flex; align-items:center; gap:8px; }

  .da-anchor { position:absolute; display:grid; width:22px; height:22px; place-items:center; border:1px solid rgba(20,121,209,.28);
    border-radius:50%; color:var(--da-blue); background:#eff8ff; font-size:9px; font-weight:800; cursor:pointer;
    pointer-events:auto; box-shadow:0 2px 8px rgba(7,29,47,.14); transition:transform .15s ease, background .15s ease; }
  .da-anchor:hover { transform:scale(1.1); }
  .da-anchor.da-active { color:#fff; border-color:var(--da-blue-soft); background:var(--da-blue);
    box-shadow:0 0 0 4px rgba(44,147,232,.16), 0 5px 14px rgba(20,121,209,.24); transform:scale(1.08); }

  .da-outlined { outline:1.5px dashed rgba(20,121,209,.45) !important; outline-offset:2px; }
  @keyframes da-pulse { 0% { box-shadow:0 0 0 0 rgba(44,147,232,.4); } 100% { box-shadow:0 0 0 14px rgba(44,147,232,0); } }
  .da-pulsing { animation:da-pulse .9s ease-out 2; }

  .da-wires { position:fixed; inset:0; z-index:1040; width:100vw; height:100vh; pointer-events:none; }

  @media print { .da-panel, .da-anchors, .da-wires, .da-launch, .da-scroll-spacer { display:none !important; }
    html.da-open { overflow-x:visible !important; } body.da-open { padding-right:0 !important; } }
  `;
  document.head.appendChild(style);

  /* ---------- DOM 骨架 ---------- */
  const launcher = document.createElement("button");
  launcher.className = "da-launch";
  launcher.setAttribute("data-da", "1");
  launcher.innerHTML = '变更导览 <span class="da-launch-n">' + CS.changes.length + "</span>";
  document.body.appendChild(launcher);

  const panel = document.createElement("aside");
  panel.className = "da-panel";
  panel.setAttribute("data-da", "1");
  document.body.appendChild(panel);

  const scrollSpacer = document.createElement("div");
  scrollSpacer.className = "da-scroll-spacer";
  scrollSpacer.setAttribute("data-da", "1");
  document.body.appendChild(scrollSpacer);

  const anchorLayer = document.createElement("div");
  anchorLayer.className = "da-anchors";
  anchorLayer.setAttribute("data-da", "1");
  document.body.appendChild(anchorLayer);

  const wires = document.createElement("canvas");
  wires.className = "da-wires";
  wires.setAttribute("data-da", "1");
  document.body.appendChild(wires);
  const wctx = wires.getContext("2d");

  let activeId = null;   // 悬停中的变更
  let pinnedId = null;   // 点击固定的变更（再次点击取消）

  /* ---------- 面板渲染 ---------- */
  const pages = [];
  const modsByPage = {};
  moduleKeys.forEach(k => {
    const p = k.split("::")[0];
    if (!modsByPage[p]) { modsByPage[p] = []; pages.push(p); }
    modsByPage[p].push(k);
  });

  function renderPanel() {
    let html = '<div class="da-panel-inner">';
    html += '<div class="da-top"><h2>变更导览<small>' + CS.changes.length + "</small></h2><div class=\"da-top-actions\">";
    if (CS.meta.sddUrl) html += '<a class="da-sdd-doc" target="_blank" href="' + CS.meta.sddUrl + '">' + (CS.meta.sddTitle || "SDD") + " ↗</a>";
    html += '<button class="da-hide" title="收起">✕</button></div></div>';

    if (demoControls.length && window.DIFF_HOOKS && typeof window.DIFF_HOOKS.setDemoState === "function") {
      html += '<section class="da-demo"><div class="da-demo-title">演示状态</div>';
      demoControls.forEach(control => {
        html += '<div class="da-demo-row"><span class="da-demo-label">' + control.label + '</span><div class="da-segments">';
        (control.options || []).forEach(option => {
          const selected = state.demo[control.id] === option.value;
          html += '<button class="da-segment' + (selected ? " da-selected" : "") + '" data-demo-control="' + control.id +
            '" data-demo-value="' + option.value + '">' + option.label + "</button>";
        });
        html += "</div></div>";
      });
      html += "</section>";
    }

    html += '<div class="da-mods"><div class="da-mods-head"><span>模块</span><span class="da-bulk"><button data-all="on">全部显示</button><button data-all="off">全部隐藏</button></span></div>';
    pages.forEach(p => {
      html += '<div class="da-mod-group"><div class="da-mod-group-name">' + pageName(p) + "</div>";
      modsByPage[p].forEach(k => {
        const mod = k.split("::")[1];
        const types = [...new Set(byModule[k].map(c => TYPE_LABEL[c.type] || "变更"))].join("·");
        html += '<label class="da-mod" data-key="' + k + '"><input type="checkbox"' + (state.enabled[k] ? " checked" : "") + ">";
        html += '<span class="da-mod-name">' + mod + '</span><span class="da-mod-types">' + types + "</span></label>";
      });
      html += "</div>";
    });
    html += "</div>";

    const anyOn = CS.changes.some(isOn);
    if (!anyOn) {
      html += '<div class="da-empty">勾选模块后展示对应标注与连线</div>';
    } else {
      pages.forEach(p => {
        const list = CS.changes.filter(c => c.page === p && isOn(c));
        if (!list.length) return;
        html += '<section class="da-note-section"><h3 class="da-note-heading">' + pageName(p) + "</h3>";
        list.forEach(c => {
          html += '<article class="da-note" id="da-note-' + c.id + '" data-chg="' + c.id + '">';
          html += '<div class="da-note-head"><span class="da-no">' + c._no + '</span><span>' + c.title + '</span>';
          html += '<span class="da-note-kind">' + (TYPE_LABEL[c.type] || "变更") + " · " + (LEVEL_LABEL[c.level] || "") + "</span></div>";
          html += "<p>" + c.desc + "</p>";
          if (c.before && c.after) html += '<div class="da-note-ba"><b>前</b>　' + c.before + '<br><b>后</b>　' + c.after + "</div>";
          if (Array.isArray(c.examples) && c.examples.length) {
            html += '<div class="da-examples">';
            c.examples.forEach(example => {
              html += '<div class="da-example"><span class="da-example-case">' + example.case + '</span>' +
                '<code class="da-example-input">' + example.input + '</code>' +
                '<span class="da-example-result">' + example.result + "</span></div>";
            });
            html += "</div>";
          }
          if (c.sdd && CS.meta.sddUrl && c.sdd.blockId) {
            html += '<a class="da-note-sdd" target="_blank" href="' + CS.meta.sddUrl + "#" + c.sdd.blockId + '">SDD · ' + c.sdd.section + " ↗</a>";
          } else if (c.sdd && c.sdd.section) {
            html += '<span class="da-note-sdd" style="color:rgba(255,255,255,.4)">SDD · ' + c.sdd.section + "</span>";
          }
          html += "</article>";
        });
        html += "</section>";
      });
    }
    html += "</div>";
    panel.innerHTML = html;
    bindPanel();
  }

  function bindPanel() {
    panel.querySelector(".da-hide").addEventListener("click", () => setOpen(false));
    panel.querySelectorAll("[data-demo-control]").forEach(button => {
      button.addEventListener("click", () => {
        const controlId = button.getAttribute("data-demo-control");
        const value = button.getAttribute("data-demo-value");
        state.demo[controlId] = value;
        persist();
        window.DIFF_HOOKS.setDemoState(controlId, value);
        renderPanel();
        setTimeout(scheduleUpdate, 80);
      });
    });
    panel.querySelectorAll(".da-mod input").forEach(cb => {
      cb.addEventListener("change", () => {
        const k = cb.closest(".da-mod").getAttribute("data-key");
        state.enabled[k] = cb.checked;
        if (pinnedId && !isOn(CS.changes.find(x => x.id === pinnedId))) pinnedId = null;
        persist();
        renderPanel();
        syncAnnotations();
        applyActive();
        if (cb.checked) locateModule(k);
      });
    });
    panel.querySelectorAll("[data-all]").forEach(btn => {
      btn.addEventListener("click", () => {
        const on = btn.getAttribute("data-all") === "on";
        moduleKeys.forEach(k => { state.enabled[k] = on; });
        if (!on) pinnedId = null;
        persist(); renderPanel(); syncAnnotations(); applyActive();
      });
    });
    panel.querySelectorAll(".da-note").forEach(card => {
      const id = card.getAttribute("data-chg");
      card.addEventListener("mouseenter", () => setActive(id));
      card.addEventListener("mouseleave", () => clearActive(id));
      card.addEventListener("click", e => {
        if (e.target.closest("a")) return;
        const c = CS.changes.find(x => x.id === id);
        if (!c) return;
        pinnedId = id;
        applyActive();
        locateChange(c);
      });
    });
    panel.addEventListener("scroll", scheduleUpdate, { passive: true });
  }

  /* ---------- 锚点浮层 ---------- */
  const anchorEls = {};   // change.id -> { el, last:{x,y,shown} }
  CS.changes.forEach(c => {
    const a = document.createElement("button");
    a.className = "da-anchor";
    a.setAttribute("data-da", "1");
    a.textContent = c._no;
    a.style.display = "none";
    a.addEventListener("mouseenter", () => setActive(c.id));
    a.addEventListener("mouseleave", () => clearActive(c.id));
    a.addEventListener("click", () => {
      togglePin(c.id);
      if (pinnedId === c.id) {
        const card = document.getElementById("da-note-" + c.id);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    });
    anchorLayer.appendChild(a);
    anchorEls[c.id] = { el: a, last: { x: -1, y: -1, shown: false } };
  });

  function targetVisible(el, rect) {
    if (!el.getClientRects().length) return false;
    // 遮挡检测（仅当取样点在视口内才有意义）：取样点若不属于目标元素（如被弹窗蒙层盖住），视为不可见。
    // 目标滚出视口时不做钳制、不强行隐藏——锚点随文档自然滚出即可。
    const inViewport = (x, y) => x >= 0 && x <= innerWidth && y >= 0 && y <= innerHeight;
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    if (inViewport(cx, cy)) {
      const top = document.elementFromPoint(cx, cy);
      if (top && (el === top || el.contains(top) || top.contains(el))) return true;
      const sx = rect.left + 10, sy = rect.top + 10;
      if (inViewport(sx, sy)) {
        const top2 = document.elementFromPoint(sx, sy);
        return !!(top2 && (el === top2 || el.contains(top2) || top2.contains(el)));
      }
      return false;
    }
    return true;
  }

  function syncAnnotations() {
    Object.keys(byTarget).forEach(t => {
      const el = document.querySelector(t);
      if (!el) return;
      const on = byTarget[t].some(isOn) && state.open;
      el.classList.toggle("da-outlined", on);
    });
    scheduleUpdate();
  }

  function updateOverlay() {
    // 锚点钉在目标左上角，使用文档坐标（以锚点层自身为基准），随页面原生滚动——
    // 杜绝 fixed 浮层"滚动事件追帧"造成的抖动漂移，也不做视口钳制（滚出即自然滚出）
    const layerRect = anchorLayer.getBoundingClientRect();
    Object.keys(byTarget).forEach(t => {
      const el = document.querySelector(t);
      const rect = el ? el.getBoundingClientRect() : null;
      const visible = el && state.open && rect && targetVisible(el, rect);
      byTarget[t].forEach((c, slot) => {
        const rec = anchorEls[c.id];
        const show = visible && isOn(c);
        if (!show) {
          if (rec.last.shown) { rec.el.style.display = "none"; rec.last.shown = false; }
          return;
        }
        const x = Math.max(rect.left - 11, 2) + slot * 25 - layerRect.left;
        const y = rect.top - 11 - layerRect.top;
        if (!rec.last.shown) { rec.el.style.display = "grid"; rec.last.shown = true; }
        if (rec.last.x !== x || rec.last.y !== y) {
          rec.el.style.left = x + "px";
          rec.el.style.top = y + "px";
          rec.last.x = x; rec.last.y = y;
        }
      });
    });
    drawWires();
  }

  /* ---------- 连线 ---------- */
  function setWireSize() {
    const ratio = Math.min(devicePixelRatio || 1, 2);
    const w = Math.max(1, Math.round(innerWidth * ratio));
    const h = Math.max(1, Math.round(innerHeight * ratio));
    if (wires.width !== w || wires.height !== h) { wires.width = w; wires.height = h; }
    wctx.setTransform(ratio, 0, 0, ratio, 0, 0);
  }

  function wirePath(sx, sy, ex, ey, active) {
    const gap = Math.max(38, ex - sx);
    wctx.save();
    wctx.beginPath();
    wctx.moveTo(sx, sy);
    wctx.bezierCurveTo(sx + Math.min(120, gap * 0.42), sy, ex - Math.min(82, gap * 0.28), ey, ex, ey);
    wctx.lineWidth = active ? 2 : 1.3;
    wctx.strokeStyle = active ? "rgba(44,147,232,.96)" : "rgba(44,147,232,.42)";
    wctx.shadowColor = active ? "rgba(44,147,232,.7)" : "transparent";
    wctx.shadowBlur = active ? 9 : 0;
    wctx.stroke();
    wctx.shadowBlur = 0;
    wctx.beginPath(); wctx.arc(sx, sy, active ? 3.2 : 2.1, 0, Math.PI * 2);
    wctx.fillStyle = active ? "#2c93e8" : "rgba(44,147,232,.5)"; wctx.fill();
    wctx.beginPath(); wctx.arc(ex - 1, ey, active ? 3 : 2, 0, Math.PI * 2);
    wctx.fillStyle = active ? "#72c4ff" : "rgba(114,196,255,.45)"; wctx.fill();
    wctx.restore();
  }

  function drawWires() {
    setWireSize();
    wctx.clearRect(0, 0, innerWidth, innerHeight);
    if (!state.open) return;
    // 一个编号一条线：固定态优先于悬停态（滚动中误触发的 hover 不得篡改已选中的连线）
    const id = pinnedId || activeId;
    if (!id) return;
    const c = CS.changes.find(x => x.id === id);
    if (!c || !isOn(c)) return;
    const rec = anchorEls[id];
    if (!rec.last.shown) return;
    // 起点取锚点实时视口坐标（锚点在文档流中，滚动时坐标必须现算，不能用缓存）
    const ar = rec.el.getBoundingClientRect();
    if (ar.bottom < 0 || ar.top > innerHeight) return; // 锚点滚出视口则不画线
    const card = document.getElementById("da-note-" + id);
    if (!card) return;
    const cr = card.querySelector(".da-no").getBoundingClientRect();
    if (cr.bottom < 40 || cr.top > innerHeight - 8) return;
    wirePath(ar.right, ar.top + ar.height / 2, innerWidth - PANEL_W + 1, cr.top + cr.height / 2, true);
  }

  /* ---------- 高亮联动 ---------- */
  function applyActive() {
    // 固定态优先：钉住某编号后，悬停其他锚点不改变高亮与连线
    const id = pinnedId || activeId;
    CS.changes.forEach(c => {
      anchorEls[c.id].el.classList.toggle("da-active", c.id === id);
      const card = document.getElementById("da-note-" + c.id);
      if (card) card.classList.toggle("da-active", c.id === id);
    });
    drawWires();
  }
  function setActive(id) { activeId = id; applyActive(); }
  function clearActive(id) { if (activeId === id) { activeId = null; applyActive(); } }
  function togglePin(id) {
    pinnedId = pinnedId === id ? null : id;
    applyActive();
  }

  /* ---------- 定位 ---------- */
  function locateChange(c) {
    if (window.DIFF_HOOKS && typeof window.DIFF_HOOKS.locate === "function") window.DIFF_HOOKS.locate(c.page);
    else if (window.DIFF_HOOKS && typeof window.DIFF_HOOKS.showPage === "function") window.DIFF_HOOKS.showPage(c.page);
    setTimeout(() => {
      const el = document.querySelector(c.target);
      if (!el) return;
      el.scrollIntoView({ block: "center", behavior: "smooth" });
      el.classList.remove("da-pulsing"); void el.offsetWidth; el.classList.add("da-pulsing");
      setTimeout(() => el.classList.remove("da-pulsing"), 2000);
      scheduleUpdate();
    }, 160);
  }
  function locateModule(key) { locateChange(byModule[key][0]); }

  /* ---------- 内容视口 ---------- */
  function syncScrollSpace() {
    if (!state.open) return;
    scrollSpacer.style.display = "none";
    const contentWidth = Math.max(document.documentElement.clientWidth, document.documentElement.scrollWidth);
    scrollSpacer.style.left = contentWidth + "px";
    scrollSpacer.style.display = "block";
  }

  /* ---------- 开关 ---------- */
  function setOpen(open) {
    state.open = open;
    persist();
    document.documentElement.classList.toggle("da-open", open);
    document.body.classList.toggle("da-open", open);
    panel.style.display = open ? "" : "none";
    launcher.style.display = open ? "none" : "";
    if (open) {
      syncScrollSpace();
    } else {
      scrollSpacer.style.display = "none";
      if (scrollX) window.scrollTo(0, scrollY);
    }
    syncAnnotations();
  }
  launcher.addEventListener("click", () => setOpen(true));

  /* ---------- 更新调度 ---------- */
  let frame = 0;
  function scheduleUpdate() {
    cancelAnimationFrame(frame);
    frame = requestAnimationFrame(updateOverlay);
  }
  window.addEventListener("scroll", scheduleUpdate, { passive: true, capture: true });
  window.addEventListener("resize", () => {
    syncScrollSpace();
    scheduleUpdate();
  }, { passive: true });
  document.addEventListener("click", e => {
    if (e.target.closest("[data-da]")) return;
    setTimeout(scheduleUpdate, 60);
    setTimeout(scheduleUpdate, 360);
  }, true);
  const mo = new MutationObserver(records => {
    if (records.every(r => r.target && r.target.closest && r.target.closest("[data-da]"))) return;
    syncScrollSpace();
    scheduleUpdate();
  });
  mo.observe(document.body, { attributes: true, attributeFilter: ["class", "style"], childList: true, subtree: true });

  /* ---------- 初始 ---------- */
  if (window.DIFF_HOOKS && typeof window.DIFF_HOOKS.setDemoState === "function") {
    demoControls.forEach(control => window.DIFF_HOOKS.setDemoState(control.id, state.demo[control.id]));
  }
  renderPanel();
  setOpen(state.open);
  setTimeout(scheduleUpdate, 150);
})();

</script>
</body>
</html>
