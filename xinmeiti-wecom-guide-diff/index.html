<meta charset="UTF-8">

<title>新媒体激活页引导加企微 - 原型（含变更标注）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f5f5f5; }
.phone-frame { width: 375px; height: 812px; margin: 20px auto; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; border: 8px solid #1a1a1a; }
.status-bar { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; padding: 0 16px; }
.page { display: none; height: calc(100% - 44px); overflow-y: auto; position: relative; background: #fff; }
.page.active { display: block; }

.nav-bar { height: 44px; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; background: #fff; }
.nav-close { font-size: 18px; cursor: pointer; color: #333; width: 30px; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 500; color: #000; }
.nav-title .subtitle { font-size: 11px; color: #999; font-weight: 400; }
.nav-more { font-size: 18px; color: #333; width: 30px; text-align: right; cursor: pointer; }

.success-content { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 120px; }
.success-icon { width: 72px; height: 72px; border-radius: 50%; background: #4caf50; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
.success-icon::after { content: '✓'; color: #fff; font-size: 36px; font-weight: bold; }
.success-text { font-size: 16px; color: #333; text-align: center; line-height: 1.6; }

.wechat-guide-area { position: absolute; bottom: 120px; left: 0; right: 0; padding: 0 30px; }
.wechat-guide-btn { display: block; width: 100%; padding: 14px; background: #07c160; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; text-align: center; }
.wechat-guide-btn:active { background: #06ad56; }

.wechat-page { background: #ededed; height: 100%; display: flex; flex-direction: column; }
.wechat-nav { height: 44px; background: #ededed; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #d9d9d9; }
.wechat-nav .back-btn { font-size: 18px; cursor: pointer; color: #333; width: 30px; }
.wechat-nav .title { flex: 1; text-align: center; font-size: 16px; color: #333; font-weight: 500; }
.wechat-add-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
.wechat-add-content .teacher-card { display: flex; flex-direction: column; align-items: center; }
.wechat-add-content .avatar { width: 80px; height: 80px; border-radius: 8px; background: #07c160; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; font-weight: bold; margin-bottom: 16px; }
.wechat-add-content h3 { font-size: 18px; color: #333; margin-bottom: 6px; }
.wechat-add-content .corp-info { font-size: 13px; color: #999; margin-bottom: 6px; }
.wechat-add-content .corp-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: #fff; border-radius: 4px; font-size: 12px; color: #576b95; margin-bottom: 30px; border: 1px solid #e8e8e8; }
.wechat-add-content .add-btn { width: 200px; padding: 10px; background: #07c160; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
.wechat-add-content .add-btn:active { background: #06ad56; }

.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; display: none; }
.toast.show { display: block; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

.demo-controls { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; background: #fff; border-top: 1px solid #eee; padding: 10px 16px; display: flex; gap: 8px; z-index: 100; }
.demo-btn { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; text-align: center; cursor: pointer; background: #fff; color: #333; }
.demo-btn.active { border-color: #667eea; color: #667eea; background: #f0f0ff; }

.non-newmedia-note { position: absolute; bottom: 60px; left: 20px; right: 20px; padding: 12px; background: #fff3e0; border-radius: 8px; border: 1px solid #ffe0b2; font-size: 12px; color: #e65100; line-height: 1.5; text-align: center; }

</head>

  <div class="page" id="page-non-newmedia" data-diff-page="激活成功页（非新媒体渠道）">

      <div class="nav-close" onclick="showToast('关闭页面')">✕</div>
      <div class="nav-title">
        绑定课程权益
        <div class="subtitle">base-h5.yangcong345.com</div>
      </div>
      <div class="nav-more">···</div>
    </div>

    <div class="success-content">
      <div class="success-icon"></div>
      <p class="success-text">绑定成功，请立即下载洋葱学园APP学习！</p>
    </div>

    <div class="non-newmedia-note">ℹ️ 非新媒体渠道：展示当前线上已有激活成功页，无企微引导按钮</div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<!-- Demo Controls -->
<div class="demo-controls">
  <div class="demo-btn active" id="btn-scene1" onclick="switchScene('hit-assistant')">命中助教组商品ID</div>
  <div class="demo-btn" id="btn-scene2" onclick="switchScene('miss-assistant')">未命中(默认私域)</div>
  <div class="demo-btn" id="btn-scene3" onclick="switchScene('non-newmedia')">非新媒体渠道</div>
</div>

<script>
let currentScene = 'hit-assistant';

function switchScene(scene) {
  currentScene = scene;
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));

  if (scene === 'hit-assistant') {
    document.getElementById('btn-scene1').classList.add('active');
    showPage('page-activation');
  } else if (scene === 'miss-assistant') {
    document.getElementById('btn-scene2').classList.add('active');
    showPage('page-activation');
  } else {
    document.getElementById('btn-scene3').classList.add('active');
    showPage('page-non-newmedia');
  }
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function goToWechat() {
  showPage('page-wechat');
  if (currentScene === 'hit-assistant') {
    document.getElementById('wechat-avatar').textContent = '助';
    document.getElementById('wechat-name').textContent = '助教老师';
    document.getElementById('wechat-role').textContent = '学员服务 · 助教';
  } else {
    document.getElementById('wechat-avatar').textContent = '私';
    document.getElementById('wechat-name').textContent = '私域老师';
    document.getElementById('wechat-role').textContent = '学员运营 · 班主任';
  }
}

function goBack() {
  showPage('page-activation');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// 供变更标注层跳页使用
window.DIFF_HOOKS = { showPage: showPage };
</script>

  .da-highlight { outline: 2px dashed transparent; outline-offset: 2px; }
  .da-banner { padding: 8px 12px; font-size: 12px; color: #fff; display: flex; align-items: center; gap: 8px; cursor: pointer; line-height: 1.5; }
  .da-banner b { font-weight: 700; }
  .da-pop-mask { position: fixed; inset: 0; background: rgba(17,24,39,.45); z-index: 9500; display: none; }
  .da-pop-mask.open { display: block; }
  .da-pop { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 340px; max-width: calc(100vw - 32px); max-height: 80vh; overflow-y: auto; background: #fff; border-radius: 14px; z-index: 9600; padding: 18px; display: none; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .da-pop.open { display: block; }
  .da-pop .da-pop-type { display: inline-block; color: #fff; font-size: 11px; font-weight: 700; border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }
  .da-pop h4 { font-size: 16px; color: #111827; margin-bottom: 8px; }
  .da-pop .da-pop-desc { font-size: 13px; color: #374151; line-height: 1.7; margin-bottom: 10px; }
  .da-pop .da-ba { background: #f8fafc; border-radius: 8px; padding: 10px 12px; font-size: 12px; line-height: 1.7; margin-bottom: 12px; }
  .da-pop .da-ba .lbl { color: #9ca3af; }
  .da-pop .da-links { display: flex; flex-direction: column; gap: 8px; }
  .da-pop .da-link-btn { display: block; text-align: center; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
  .da-pop .da-link-prd { background: #2563eb; color: #fff; }
  .da-pop .da-link-sdd { background: #eef2ff; color: #4338ca; }
  .da-pop .da-close { position: absolute; top: 10px; right: 14px; font-size: 18px; color: #9ca3af; cursor: pointer; background: none; border: none; }
  .da-drawer { position: fixed; top: 0; right: -420px; width: 400px; max-width: 92vw; height: 100vh; background: #fff; z-index: 9700; box-shadow: -8px 0 30px rgba(0,0,0,.2); transition: right .25s ease; display: flex; flex-direction: column; }
  .da-drawer.open { right: 0; }
  .da-drawer-head { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 600; color: #111827; }
  .da-drawer-head button { background: none; border: none; font-size: 18px; color: #9ca3af; cursor: pointer; }
  .da-drawer iframe { flex: 1; border: none; width: 100%; }
  `;
  document.head.appendChild(style);

  // ---------- 状态 ----------
  // 模块 key = page + "::" + module；勾选粒度为模块级，默认全部关闭
  const moduleKeys = [];
  const byModule = {};
  CS.changes.forEach(c => {
    const key = c.page + "::" + c.module;
    if (!byModule[key]) { byModule[key] = []; moduleKeys.push(key); }
    byModule[key].push(c);
  });
  let enabled = {};
  try { enabled = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch (e) { enabled = {}; }
  moduleKeys.forEach(k => { if (!(k in enabled)) enabled[k] = false; });

  function persist() { try { localStorage.setItem(LS_KEY, JSON.stringify(enabled)); } catch (e) {} }

  // ---------- 徽标 / 横幅渲染 ----------
  const rendered = {}; // change.id -> [elements]
  function pageName(pid) {
    const el = document.getElementById(pid);
    return (el && el.getAttribute("data-diff-page")) || pid;
  }

  function renderChange(c) {
    const target = document.querySelector(c.target);
    if (!target) return;
    const meta = TYPE_META[c.type] || TYPE_META.modify;
    const els = [];

    if (c.level === "page") {
      const banner = document.createElement("div");
      banner.className = "da-banner";
      banner.style.background = meta.color;
      banner.innerHTML = "<b>[" + meta.label + "]</b><span>" + c.title + "（点击看详情）</span>";
      banner.addEventListener("click", () => openPopover(c));
      target.insertBefore(banner, target.firstChild);
      els.push(banner);
    } else {
      const cs = getComputedStyle(target);
      if (cs.position === "static") target.style.position = "relative";
      target.classList.add("da-highlight");
      target.style.outlineColor = meta.color;
      const stack = target.querySelectorAll(":scope > .da-badge").length;
      const badge = document.createElement("span");
      badge.className = "da-badge";
      badge.style.background = meta.color;
      badge.style.top = (-10 - stack * 20) + "px";
      badge.style.right = "-2px";
      badge.textContent = meta.label + (c.level === "field" ? "·字段" : "");
      badge.title = c.title;
      badge.addEventListener("click", e => { e.stopPropagation(); openPopover(c); });
      target.appendChild(badge);
      els.push(badge);
      els.push(target); // 记录以便清理 highlight
    }
    rendered[c.id] = els;
  }

  function unrenderChange(c) {
    const els = rendered[c.id];
    if (!els) return;
    els.forEach(el => {
      if (el.classList.contains("da-badge") || el.classList.contains("da-banner")) el.remove();
    });
    // 若目标元素已无徽标则移除高亮
    const target = document.querySelector(c.target);
    if (target && !target.querySelector(":scope > .da-badge")) {
      target.classList.remove("da-highlight");
      target.style.outlineColor = "";
    }
    delete rendered[c.id];
  }

  function applyModule(key) {
    byModule[key].forEach(c => { enabled[key] ? (rendered[c.id] || renderChange(c)) : unrenderChange(c); });
  }
  function applyAll() { moduleKeys.forEach(applyModule); }

  // ---------- 详情弹层 ----------
  const mask = document.createElement("div"); mask.className = "da-pop-mask";
  const pop = document.createElement("div"); pop.className = "da-pop";
  document.body.appendChild(mask); document.body.appendChild(pop);
  mask.addEventListener("click", closePopover);
  function closePopover() { mask.classList.remove("open"); pop.classList.remove("open"); }

  function openPopover(c) {
    const meta = TYPE_META[c.type] || TYPE_META.modify;
    const levelLabel = { page: "页面级", module: "模块级", field: "字段级" }[c.level] || "";
    let html = '<button class="da-close">✕</button>';
    html += '<span class="da-pop-type" style="background:' + meta.color + '">' + meta.label + " · " + levelLabel + "</span>";
    html += "<h4>" + c.title + "</h4>";
    html += '<div class="da-pop-desc">' + c.desc + "</div>";
    if (c.before || c.after) {
      html += '<div class="da-ba"><div><span class="lbl">改动前：</span>' + (c.before || "—") + '</div><div><span class="lbl">改动后：</span>' + (c.after || "—") + "</div></div>";
    }
    html += '<div class="da-links">';
    if (c.prd) {
      if (CS.meta.prdType === "feishu" && c.prd.blockId) {
        html += '<a class="da-link-btn da-link-prd" target="_blank" href="' + CS.meta.prdUrl + "#" + c.prd.blockId + '">打开 PRD → ' + c.prd.section + "</a>";
      } else if (CS.meta.prdType === "html" && c.prd.anchor) {
        html += '<button class="da-link-btn da-link-prd" data-drawer="' + CS.meta.prdUrl + "#" + c.prd.anchor + '" data-drawer-title="PRD：' + c.prd.section + '">查看 PRD → ' + c.prd.section + "</button>";
      } else {
        html += '<div class="da-ba">PRD 章节：' + c.prd.section + "</div>";
      }
    }
    if (c.sdd && CS.meta.sddUrl) {
      if (CS.meta.sddType === "html") {
        html += '<button class="da-link-btn da-link-sdd" data-drawer="' + CS.meta.sddUrl + "#" + c.sdd.anchor + '" data-drawer-title="SDD：' + c.sdd.reqId + '">查看 SDD 需求 ' + c.sdd.reqId + "（侧边联动）</button>";
      } else {
        html += '<a class="da-link-btn da-link-sdd" target="_blank" href="' + CS.meta.sddUrl + '">打开 SDD：' + c.sdd.reqId + "</a>";
      }
    }
    html += "</div>";
    pop.innerHTML = html;
    pop.querySelector(".da-close").addEventListener("click", closePopover);
    pop.querySelectorAll("[data-drawer]").forEach(btn => {
      btn.addEventListener("click", () => { openDrawer(btn.getAttribute("data-drawer"), btn.getAttribute("data-drawer-title")); });
    });
    mask.classList.add("open");
    pop.classList.add("open");
  }

  // ---------- SDD/PRD(HTML) 侧边抽屉 ----------
  const drawer = document.createElement("div");
  drawer.className = "da-drawer";
  drawer.innerHTML = '<div class="da-drawer-head"><span id="da-drawer-title">文档</span><button id="da-drawer-close">✕</button></div><iframe id="da-drawer-frame" src="about:blank"></iframe>';
  document.body.appendChild(drawer);
  drawer.querySelector("#da-drawer-close").addEventListener("click", () => drawer.classList.remove("open"));
  function openDrawer(url, title) {
    drawer.querySelector("#da-drawer-title").textContent = title || "文档";
    const frame = drawer.querySelector("#da-drawer-frame");
    // 相同 URL 仅 hash 变化时强制刷新，保证锚点高亮重新触发
    frame.src = "about:blank";
    setTimeout(() => { frame.src = url; }, 30);
    drawer.classList.add("open");
    closePopover();
  }

  // ---------- 控制面板 ----------
  const launcher = document.createElement("button");
  launcher.className = "da-launcher";
  launcher.innerHTML = '变更导览 <span class="da-count">' + CS.changes.length + "</span>";
  document.body.appendChild(launcher);

  const panel = document.createElement("div");
  panel.className = "da-panel";
  let head = '<div class="da-panel-head"><h4>本次变更导览</h4><div class="da-meta">';
  head += "基线：" + CS.meta.baseline + "<br>版本：" + CS.meta.version + "　";
  head += '<a target="_blank" href="' + CS.meta.prdUrl + '">' + (CS.meta.prdTitle || "PRD") + "</a>";
  if (CS.meta.sddUrl && CS.meta.sddType !== "html") head += '　<a target="_blank" href="' + CS.meta.sddUrl + '">SDD</a>';
  head += "</div></div>";
  head += '<div class="da-bulk"><button id="da-all-on">全部显示</button><button id="da-all-off">全部隐藏</button></div>';
  head += '<div class="da-hint">默认不展示标注。按模块勾选想看的变更点：</div>';

  // 按页面分组
  const pages = [];
  const modsByPage = {};
  moduleKeys.forEach(k => {
    const p = k.split("::")[0];
    if (!modsByPage[p]) { modsByPage[p] = []; pages.push(p); }
    modsByPage[p].push(k);
  });
  let body = "";
  pages.forEach(p => {
    body += '<div class="da-group"><div class="da-group-title">📄 ' + pageName(p) + "</div>";
    modsByPage[p].forEach(k => {
      const mod = k.split("::")[1];
      const chips = byModule[k].map(c => {
        const m = TYPE_META[c.type] || TYPE_META.modify;
        return '<span class="da-chip" style="background:' + m.color + '">' + m.label + "</span>";
      }).join("");
      body += '<label class="da-mod-row"><input type="checkbox" data-key="' + k + '"' + (enabled[k] ? " checked" : "") + ">";
      body += '<span class="da-mod-info"><span class="da-mod-name">' + mod + "（" + byModule[k].length + "）</span><span class=\"da-mod-tags\">" + chips + "</span></span>";
      body += '<span class="da-goto" data-page="' + p + '">跳页</span></label>';
    });
    body += "</div>";
  });
  panel.innerHTML = head + body;
  document.body.appendChild(panel);

  launcher.addEventListener("click", () => panel.classList.toggle("open"));
  panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", () => {
      const k = cb.getAttribute("data-key");
      enabled[k] = cb.checked;
      applyModule(k);
      persist();
    });
  });
  panel.querySelectorAll(".da-goto").forEach(g => {
    g.addEventListener("click", e => {
      e.preventDefault(); e.stopPropagation();
      const pid = g.getAttribute("data-page");
      if (window.DIFF_HOOKS && window.DIFF_HOOKS.showPage) window.DIFF_HOOKS.showPage(pid);
    });
  });
  panel.querySelector("#da-all-on").addEventListener("click", () => {
    moduleKeys.forEach(k => { enabled[k] = true; });
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = true; });
    applyAll(); persist();
  });
  panel.querySelector("#da-all-off").addEventListener("click", () => {
    moduleKeys.forEach(k => { enabled[k] = false; });
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
    applyAll(); persist();
  });

  // 初始应用（localStorage 中已勾选的模块恢复展示）
  applyAll();
})();
</script>
</body>
</html>
